services:
  app:
    build:
      context: ./src
      dockerfile: Dockerfile
    image: kawa-watch-app
    container_name: kawa-watch-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./src:/var/www
    ports:
      - "8093:8000"
    depends_on:
      - db
    command: >
      sh -c "
      if [ ! -f vendor/autoload.php ]; then composer install; fi &&
      if [ ! -f public/build/manifest.json ]; then npm ci && npm run build; fi &&
      php artisan serve --host=0.0.0.0 --port=8000
      "

  db:
    image: mysql:8.0
    container_name: kawa-watch-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: laravel
      MYSQL_ROOT_PASSWORD: password
      MYSQL_USER: laravel
      MYSQL_PASSWORD: password
    ports:
      - "127.0.0.1:3307:3306"
    volumes:
      - kawa-watch-db-data:/var/lib/mysql

  scheduler:
    image: kawa-watch-app
    container_name: kawa-watch-scheduler
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./src:/var/www
    depends_on:
      - app
      - db
      - localstack
    command: php artisan schedule:work

  worker:
    image: kawa-watch-app
    container_name: kawa-watch-worker
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./src:/var/www
    depends_on:
      - app
      - db
      - localstack
    command: php artisan app:bulk-queue-worker

  localstack:
    image: localstack/localstack:3.0
    container_name: kawa-watch-localstack
    restart: unless-stopped
    ports:
      - "127.0.0.1:4567:4566"
    environment:
      - AWS_DEFAULT_REGION=ap-northeast-1
      - SERVICES=sqs,s3
    volumes:
      - kawa-watch-localstack-data:/var/lib/localstack
      - ./docker/localstack/init/ready.d:/etc/localstack/init/ready.d

volumes:
  kawa-watch-localstack-data:
  kawa-watch-db-data:
